<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · ThinkRich Community</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0b;
        color: #f4f4f5;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        text-align: center;
        padding: 2rem;
      }
      .card { max-width: 26rem; }
      h1 { font-size: 1.5rem; font-weight: 650; margin: 0 0 0.75rem; letter-spacing: -0.01em; }
      p { margin: 0 0 1.5rem; color: #a1a1aa; line-height: 1.6; font-size: 0.95rem; }
      button {
        min-height: 44px;
        padding: 0 1.25rem;
        border: 0;
        border-radius: 8px;
        background: #009752;
        color: #fff;
        font-size: 0.95rem;
        font-weight: 650;
        cursor: pointer;
      }
      button:hover { background: #057948; }
      .dot { color: #009752; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline<span class="dot">.</span></h1>
      <p>
        You need a connection to use the ThinkRich Community app. Your details are safe. Reconnect
        and try again.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
